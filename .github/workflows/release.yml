name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r src/requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller ClaudeUsageTray.spec --distpath dist --workpath build --noconfirm

      - name: Get tag annotation
        id: tag_msg
        shell: bash
        run: |
          git fetch --tags --force
          MSG=$(git tag -l "$GITHUB_REF_NAME" --format='%(contents)')
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MSG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag_msg.outputs.body }}
          draft: false
          prerelease: false
          files: dist/ClaudeUsageTray.exe
